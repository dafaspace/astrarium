<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Astrarium</title>
<style>
:root{
  --paper:#f6f2ea; --paper2:#efe9dd; --paper3:#e6dece; --line:#d8cfba;
  --ink:#211d18; --ink2:#5f574a; --ink3:#9a8f7c;
  --accent:#b5714a; --axis:#c04f86; --mc:#3f6ea5;
  --harm:#3f6ea5; --hard:#c0685c; --conj:#7d8a6a;
  --wheelbg:#eef4f5;
  --fire:#e39a86; --earth:#a9c99a; --air:#e6d38a; --water:#8fc7d4;
  --radius:16px;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#17150f; --paper2:#1f1c15; --paper3:#272319; --line:#38321f;
    --ink:#efe7d6; --ink2:#b3a892; --ink3:#7c7360;
    --accent:#d68c60; --wheelbg:#12171a;
    --axis:#d67aa6; --mc:#6f9fd0; --harm:#6f9fd0;
    --fire:#a86a58; --earth:#6f8a62; --air:#a89454; --water:#5c8a94;
  }
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--paper); color:var(--ink);
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  -webkit-text-size-adjust:100%; padding:0 0 60px;
}
h1,h2,h3,.serif{font-family:"Newsreader",Georgia,"Times New Roman",serif;font-weight:500}
header{padding:20px 20px 8px;max-width:760px;margin:0 auto;display:flex;align-items:flex-start;gap:12px}
header .ht{flex:1}
header h1{font-size:26px;margin:0;letter-spacing:.2px}
header p{margin:4px 0 0;color:var(--ink2);font-size:13px}
.wrap{max-width:760px;margin:0 auto;padding:0 20px}
.card{background:var(--paper2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:14px 0}
.card h2{font-size:16px;margin:0 0 12px}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin:0 0 4px}
input,select{
  width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:10px;
  background:var(--paper);color:var(--ink);font:inherit;font-variant-numeric:tabular-nums;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
button{font:inherit;cursor:pointer;border-radius:10px;border:1px solid var(--line);background:var(--paper3);color:var(--ink);padding:9px 14px}
button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.lang{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:none}
.lang button{border:none;border-radius:0;padding:6px 11px;background:var(--paper2);font-size:13px}
.lang button.on{background:var(--accent);color:#fff}
.mono,.deg{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
svg{display:block;width:100%;height:auto;touch-action:manipulation}
.planet-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
.planet-row:last-child{border-bottom:none}
.planet-row .g{font-size:19px;width:26px;text-align:center}
.planet-row .nm{width:110px;color:var(--ink2)}
.planet-row .pos{font-weight:500}
.planet-row .hs{margin-left:auto;color:var(--ink3);font-size:12px}
.muted{color:var(--ink2)}
.tiny{font-size:12px;color:var(--ink3)}
.detail{background:var(--paper3);border-radius:12px;padding:12px;margin-top:10px;min-height:20px}
.detail.empty{color:var(--ink3);font-style:italic}
.transit{border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0;background:var(--paper)}
.transit .head{display:flex;align-items:center;gap:8px;font-size:15px}
.transit .bar{height:6px;border-radius:3px;background:var(--paper3);margin:8px 0;overflow:hidden}
.transit .bar i{display:block;height:100%;background:var(--accent)}
.rate{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.chip{padding:5px 9px;border:1px solid var(--line);border-radius:999px;font-size:12px;cursor:pointer;background:var(--paper2);user-select:none}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.stars{letter-spacing:2px;font-size:18px;cursor:pointer;user-select:none;color:var(--ink3)}
.stars b{color:var(--accent);font-weight:400}
.learn-line{padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.learn-line:last-child{border:none}
.learn-line b{color:var(--accent);font-weight:500}
.pill{display:inline-block;font-size:11px;padding:2px 7px;border-radius:999px;background:var(--paper3);color:var(--ink2);margin-left:6px}
.foot{max-width:760px;margin:20px auto;padding:0 20px;color:var(--ink3);font-size:12px}
a{color:var(--accent)}
.glyph{font-family:"Segoe UI Symbol","Apple Symbols","Noto Sans Symbols2",serif}
.citywrap{position:relative}
.citylist{position:absolute;left:0;right:0;top:100%;margin-top:4px;background:var(--paper);border:1px solid var(--line);border-radius:10px;max-height:220px;overflow:auto;z-index:20;box-shadow:0 8px 20px rgba(0,0,0,.14);display:none}
.citylist div{padding:8px 10px;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;gap:8px}
.citylist div:hover{background:var(--paper3)}
.citylist .cc{color:var(--ink3);font-size:12px}
</style>

<header>
  <div class="ht">
    <h1>Astrarium</h1>
    <p data-i="tagline"></p>
  </div>
  <div class="lang">
    <button data-lang="ru">RU</button><button data-lang="en">EN</button>
  </div>
</header>

<div class="wrap">

  <div class="card">
    <h2 data-i="birth"></h2>
    <div class="grid">
      <div><label data-i="date"></label><input id="date" type="date" value="1985-10-03"></div>
      <div><label data-i="time"></label><input id="time" type="time" value="13:37"></div>
    </div>
    <div class="citywrap" style="margin-top:10px">
      <label data-i="city"></label>
      <input id="city" type="text" autocomplete="off">
      <div id="citylist" class="citylist"></div>
    </div>
    <div class="grid3" style="margin-top:10px">
      <div><label data-i="lat"></label><input id="lat" type="number" step="0.0001" value="59.9343"></div>
      <div><label data-i="lng"></label><input id="lng" type="number" step="0.0001" value="30.3351"></div>
      <div><label data-i="tz"></label><input id="tz" type="text" value="+03:00" placeholder="+03:00"></div>
    </div>
    <div style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <button class="primary" id="calc" data-i="cast"></button>
      <span class="tiny" data-i="hint"></span>
    </div>
  </div>

  <div class="card">
    <h2 data-i="wheel"></h2>
    <div id="wheel"></div>
    <div class="detail empty" id="detail"></div>
  </div>

  <div class="card">
    <h2 data-i="positions"></h2>
    <div id="positions"></div>
    <div class="tiny" style="margin-top:8px" data-i="posnote"></div>
  </div>

  <div class="card">
    <h2 data-i="reading"></h2>
    <div id="reading"></div>
  </div>

  <div class="card">
    <h2 data-i="transits"></h2>
    <p class="tiny" style="margin-top:0" data-i="transintro"></p>
    <div id="transitlist"></div>
  </div>

  <div class="card">
    <h2 data-i="learned"></h2>
    <div id="learnedbox"></div>
    <div style="margin-top:10px"><button id="reset" data-i="forget"></button></div>
  </div>

</div>

<div class="foot" data-i="foot"></div>

<script>
"use strict";
/* ============================================================
   ASTRARIUM - offline core prototype
   ============================================================ */

/* ---------- i18n ---------- */
let LANG = localStorage.getItem('astrarium_lang') || 'ru';
const STR = {
  tagline:{ru:'Офлайновое ядро расчёта и интерпретации. Ни сети, ни API. ', en:'Offline calculation + interpretation core. No network, no API. '},
  birth:{ru:'Данные рождения',en:'Birth data'},
  date:{ru:'Дата',en:'Date'}, time:{ru:'Время (местное)',en:'Time (local)'},
  lat:{ru:'Широта',en:'Latitude'}, lng:{ru:'Долгота',en:'Longitude'}, tz:{ru:'Смещение UTC (ч)',en:'UTC offset (h)'},
  cast:{ru:'Построить карту',en:'Cast chart'},
  city:{ru:'Город рождения',en:'Birth city'},
  cityph:{ru:'Начните вводить название...',en:'Start typing a name...'},
  hint:{ru:'Смещение UTC подставляется автоматически из часового пояса выбранного города для точной даты, старые изменения времени учтены. Правка вручную нужна лишь в редких случаях: день перехода на летнее время или местное время до стандартизации поясов.',en:'The UTC offset fills in automatically from the chosen city’s time zone for the exact date, historical shifts included. Manual editing is only for rare edge cases: the day of a DST changeover, or local time before zones were standardized.'},
  wheel:{ru:'Колесо карты',en:'Chart wheel'},

  positions:{ru:'Позиции',en:'Positions'},
  posnote:{ru:'Дома целознаковые. Асцендент и MC из звёздного времени. Движок: компактный аналитический ряд (Шлютер), целиком офлайн, это шов, куда встаёт Swiss Ephemeris (WASM) для точности до секунды.',en:'Whole-sign houses. Ascendant and MC from sidereal time. Engine: compact analytic series (Schlyter), fully offline, the seam where Swiss Ephemeris (WASM) drops in for arc-second grade.'},
  reading:{ru:'Разбор карты',en:'Natal reading'},
  transits:{ru:'Транзиты на сегодня',en:"Today's transits"},
  transintro:{ru:'Транзитные планеты сегодня к вашей натальной карте. Оцените, как каждый реально ощущается, движок подстраивает ранжирование и тон полностью без API.',en:'Transiting planets today vs your natal chart. Rate how each one actually lands, the engine adapts ranking and tone with zero API.'},
  learned:{ru:'Что Astrarium узнал о вас',en:'What Astrarium has learned about you'},
  ondevice:{ru:'на устройстве',en:'on-device'},
  forget:{ru:'Забыть всё',en:'Forget everything'},
  landq:{ru:'Зашло?',en:'Did it land?'}, felt:{ru:'Ощущалось:',en:'Felt:'},
  orb:{ru:'орбис',en:'orb'}, weight:{ru:'личный вес',en:'personal weight'}, house:{ru:'дом',en:'house'},
  lasttime:{ru:'В прошлый раз',en:'Last time'}, noaspects:{ru:'Крупных аспектов в орбисе нет.',en:'No major aspects within orb.'},
  notransits:{ru:'Сейчас транзитов в орбисе нет.',en:'No transits within orb right now.'},
  learnempty:{ru:'Оцените несколько транзитов выше. Движок строит приватную модель того, как циклы реально проживаются именно вами, ранжирование и тон подстраиваются целиком на этом устройстве.',en:'Rate a few transits above. The engine builds a private model of how cycles actually land for you, ranking and tone adapt entirely on this device.'},
  foot:{ru:'Прототип. Позиции точны до угловых минут (аналитический ряд), в продакшене встаёт swisseph-WASM. Ничто здесь не выходит в сеть.',en:'Prototype. Positions accurate to a few arc-minutes (analytic series), production swaps in swisseph-WASM. Nothing here contacts the network.'}
};
function t(k){const s=STR[k];return s?(s[LANG]!==undefined?s[LANG]:s.en):k;}

const D2R=Math.PI/180, R2D=180/Math.PI;
const rev=x=>{x=x%360;return x<0?x+360:x;};
const sind=x=>Math.sin(x*D2R), cosd=x=>Math.cos(x*D2R), tand=x=>Math.tan(x*D2R);
const atan2d=(y,x)=>rev(Math.atan2(y,x)*R2D);
const asind=x=>Math.asin(x)*R2D;

/* ---------- ephemeris (Schlyter) ---------- */
function eccAnom(M,e){
  M=rev(M); const ed=e*R2D; let E=M+ed*sind(M)*(1+e*cosd(M));
  for(let k=0;k<8;k++){const dE=(E-ed*sind(E)-M)/(1-e*cosd(E));E-=dE;if(Math.abs(dE)<1e-8)break;}
  return E;
}
function dayNumber(y,m,day,utHours){
  const d=367*y-Math.floor(7*(y+Math.floor((m+9)/12))/4)+Math.floor(275*m/9)+day-730530;
  return d+utHours/24;
}
const ELEM={
  Mercury:d=>({N:48.3313+3.24587e-5*d,i:7.0047+5.00e-8*d,w:29.1241+1.01444e-5*d,a:0.387098,e:0.205635+5.59e-10*d,M:168.6562+4.0923344368*d}),
  Venus:d=>({N:76.6799+2.46590e-5*d,i:3.3946+2.75e-8*d,w:54.8910+1.38374e-5*d,a:0.723330,e:0.006773-1.302e-9*d,M:48.0052+1.6021302244*d}),
  Mars:d=>({N:49.5574+2.11081e-5*d,i:1.8497-1.78e-8*d,w:286.5016+2.92961e-5*d,a:1.523688,e:0.093405+2.516e-9*d,M:18.6021+0.5240207766*d}),
  Jupiter:d=>({N:100.4542+2.76854e-5*d,i:1.3030-1.557e-7*d,w:273.8777+1.64505e-5*d,a:5.20256,e:0.048498+4.469e-9*d,M:19.8950+0.0830853001*d}),
  Saturn:d=>({N:113.6634+2.38980e-5*d,i:2.4886-1.081e-7*d,w:339.3939+2.97661e-5*d,a:9.55475,e:0.055546-9.499e-9*d,M:316.9670+0.0334442282*d}),
  Uranus:d=>({N:74.0005+1.3978e-5*d,i:0.7733+1.9e-8*d,w:96.6612+3.0565e-5*d,a:19.18171-1.55e-8*d,e:0.047318+7.45e-9*d,M:142.5905+0.011725806*d}),
  Neptune:d=>({N:131.7806+3.0173e-5*d,i:1.7700-2.55e-7*d,w:272.8461-6.027e-6*d,a:30.05826+3.313e-8*d,e:0.008606+2.15e-9*d,M:260.2471+0.005995147*d})
};
function sunPos(d){
  const w=282.9404+4.70935e-5*d,e=0.016709-1.151e-9*d,M=356.0470+0.9856002585*d;
  const E=eccAnom(M,e),xv=cosd(E)-e,yv=Math.sqrt(1-e*e)*sind(E);
  const v=atan2d(yv,xv),r=Math.sqrt(xv*xv+yv*yv),lon=rev(v+w);
  return {lon,r,xs:r*cosd(lon),ys:r*sind(lon),Ls:rev(w+M),Msun:rev(M)};
}
function moonPos(d,sun){
  const N=125.1228-0.0529538083*d,i=5.1454,w=318.0634+0.1643573223*d,a=60.2666,e=0.054900,M=115.3654+13.0649929509*d;
  const E=eccAnom(M,e),xv=a*(cosd(E)-e),yv=a*Math.sqrt(1-e*e)*sind(E);
  const v=atan2d(yv,xv),r=Math.sqrt(xv*xv+yv*yv);
  let xh=r*(cosd(N)*cosd(v+w)-sind(N)*sind(v+w)*cosd(i));
  let yh=r*(sind(N)*cosd(v+w)+cosd(N)*sind(v+w)*cosd(i));
  let zh=r*(sind(v+w)*sind(i));
  let lon=atan2d(yh,xh),lat=asind(zh/r);
  const Ls=sun.Ls,Ms=sun.Msun,Lm=rev(N+w+M),Mm=rev(M),Dp=rev(Lm-Ls),F=rev(Lm-N);
  lon+=-1.274*sind(Mm-2*Dp)+0.658*sind(2*Dp)-0.186*sind(Ms)-0.059*sind(2*Mm-2*Dp)
    -0.057*sind(Mm-2*Dp+Ms)+0.053*sind(Mm+2*Dp)+0.046*sind(2*Dp-Ms)+0.041*sind(Mm-Ms)
    -0.035*sind(Dp)-0.031*sind(Mm+Ms)-0.015*sind(2*F-2*Dp)+0.011*sind(Mm-4*Dp);
  return {lon:rev(lon),lat};
}
function planetPos(name,d,sun){
  const el=ELEM[name](d),E=eccAnom(el.M,el.e);
  const xv=el.a*(cosd(E)-el.e),yv=el.a*Math.sqrt(1-el.e*el.e)*sind(E);
  const v=atan2d(yv,xv),r=Math.sqrt(xv*xv+yv*yv);
  const xh=r*(cosd(el.N)*cosd(v+el.w)-sind(el.N)*sind(v+el.w)*cosd(el.i));
  const yh=r*(sind(el.N)*cosd(v+el.w)+cosd(el.N)*sind(v+el.w)*cosd(el.i));
  let lon0=atan2d(yh,xh),lon=lon0;
  const Mj=ELEM.Jupiter(d).M,Ms=ELEM.Saturn(d).M,Mu=ELEM.Uranus(d).M;
  if(name==='Jupiter'){lon+=-0.332*sind(2*Mj-5*Ms-67.6)-0.056*sind(2*Mj-2*Ms+21)+0.042*sind(3*Mj-5*Ms+21)-0.036*sind(Mj-2*Ms)+0.022*cosd(Mj-Ms)+0.023*sind(2*Mj-3*Ms+52)-0.016*sind(Mj-5*Ms-69);}
  else if(name==='Saturn'){lon+=0.812*sind(2*Mj-5*Ms-67.6)-0.229*cosd(2*Mj-4*Ms-2)+0.119*sind(Mj-2*Ms-3)+0.046*sind(2*Mj-6*Ms-69)+0.014*sind(Mj-3*Ms+32);}
  else if(name==='Uranus'){lon+=0.040*sind(Ms-2*Mu+6)+0.035*sind(Ms-3*Mu+33)-0.015*sind(Mj-Mu+20);}
  const xg=xh+sun.xs,yg=yh+sun.ys,geo=atan2d(yg,xg);
  return {lon:rev(geo+(lon-lon0))};
}
function plutoPos(d,sun){
  const P=rev(238.95+0.003968789*d)*D2R,S=rev(50.03+0.033459652*d)*D2R;
  let lon=238.9508+0.00400703*d-19.799*Math.sin(P)+19.848*Math.cos(P)+0.897*Math.sin(2*P)-4.956*Math.cos(2*P)+0.610*Math.sin(3*P)+1.211*Math.cos(3*P)-0.341*Math.sin(4*P)-0.190*Math.cos(4*P)+0.128*Math.sin(5*P)-0.034*Math.cos(5*P)-0.038*Math.sin(6*P)+0.031*Math.cos(6*P)+0.020*Math.sin(S-P)-0.010*Math.cos(S-P);
  let lat=-3.9082-5.453*Math.sin(P)-14.975*Math.cos(P)+3.527*Math.sin(2*P)+1.673*Math.cos(2*P)-1.051*Math.sin(3*P)+0.328*Math.cos(3*P)+0.179*Math.sin(4*P)-0.292*Math.cos(4*P)+0.019*Math.sin(5*P)+0.100*Math.cos(5*P)-0.031*Math.sin(6*P)-0.026*Math.cos(6*P)+0.011*Math.cos(S-P);
  let r=40.72+6.68*Math.sin(P)+6.90*Math.cos(P)-1.18*Math.sin(2*P)-0.03*Math.cos(2*P)+0.15*Math.sin(3*P)-0.14*Math.cos(3*P);
  const xh=r*cosd(lon)*cosd(lat),yh=r*sind(lon)*cosd(lat);
  return {lon:atan2d(yh+sun.ys,xh+sun.xs)};
}

const BODIES=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto'];
const GLYPH={Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'♅',Neptune:'♆',Pluto:'♇',ASC:'Asc',MC:'MC'};
const PLANET_NAME={
  ru:{Sun:'Солнце',Moon:'Луна',Mercury:'Меркурий',Venus:'Венера',Mars:'Марс',Jupiter:'Юпитер',Saturn:'Сатурн',Uranus:'Уран',Neptune:'Нептун',Pluto:'Плутон',ASC:'Асцендент',MC:'MC'},
  en:{Sun:'Sun',Moon:'Moon',Mercury:'Mercury',Venus:'Venus',Mars:'Mars',Jupiter:'Jupiter',Saturn:'Saturn',Uranus:'Uranus',Neptune:'Neptune',Pluto:'Pluto',ASC:'Ascendant',MC:'MC'}
};
const PN=n=>PLANET_NAME[LANG][n]||n;
const SIGN_NAME={
  ru:['Овен','Телец','Близнецы','Рак','Лев','Дева','Весы','Скорпион','Стрелец','Козерог','Водолей','Рыбы'],
  en:['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces']
};
const SIGN_ABBR={
  ru:['Овн','Тел','Бли','Рак','Лев','Дев','Вес','Скп','Стр','Коз','Вдл','Рыб'],
  en:['Ari','Tau','Gem','Can','Leo','Vir','Lib','Sco','Sgr','Cap','Aqr','Psc']
};
// Zodiac glyphs are drawn as vector line-icons (not Unicode characters) so they
// never depend on a system font's emoji policy - some platforms substitute a
// colorful "sticker" tile for U+2648-2653 regardless of variation selectors.
const ZODIAC_SYMBOL=[
  '<path d="M12 20 C12 14 8 12 6 12 C4 12 4 15 6 16 M12 20 C12 14 16 12 18 12 C20 12 20 15 18 16"/>',
  '<circle cx="12" cy="15" r="4.3"/><path d="M7 11 C7 6 17 6 17 11"/>',
  '<path d="M7 5 H17 M9 5 V19 M15 5 V19 M7 19 H17"/>',

function normStr(s){ return (s||'').toLowerCase().replace(/[̀-ͯ]/g,''); }
function searchCities(q){
  q=normStr(q.trim()); if(!q) return [];
  return CITIES.filter(c=>normStr(c.r).includes(q)||normStr(c.e).includes(q)).slice(0,8);
}
// "+HH:MM" / "-HH:MM" - always shows an explicit sign, never bare hours
function formatOffset(h){
  const sign=h<0?'-':'+', a=Math.abs(h); let hh=Math.floor(a+1e-9), mm=Math.round((a-hh)*60);
  if(mm===60){mm=0;hh++;}
  return sign+String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function parseOffset(str){
  const m=/^\s*([+-])?\s*(\d{1,2})(?::?(\d{2}))?\s*$/.exec(str||'');
  if(!m) return NaN;
  return (m[1]==='-'?-1:1)*(+m[2]+(+(m[3]||0))/60);
}
// Reads the UTC offset for a given IANA zone AT the given calendar date/time
// straight from the browser's built-in tz database (ICU/CLDR) - the same
// historical-transition table used by the OS. This is what makes manual
// pre-1970 offset entry unnecessary in the common case.
function ianaOffset(zone,y,mo,da,hh,mi){
  try{
    const guess=new Date(Date.UTC(y,mo-1,da,hh,mi));
    const fmt=new Intl.DateTimeFormat('en-US',{timeZone:zone,timeZoneName:'longOffset',hour12:false,
      year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    const part=fmt.formatToParts(guess).find(p=>p.type==='timeZoneName');
    if(!part) return null;
    const m=/GMT([+-])(\d{1,2})(?::(\d{2}))?/.exec(part.value);
    if(!m) return 0;
    return (m[1]==='-'?-1:1)*(+m[2]+(+(m[3]||0))/60);
  }catch(e){ return null; }
}

function computeChart(y,mo,day,localH,tzOff,lat,lng){
  const utH=localH-tzOff, d=dayNumber(y,mo,day,utH), sun=sunPos(d), ecl=23.4393-3.563e-7*d, pos={};
  pos.Sun={lon:sun.lon}; pos.Moon=moonPos(d,sun);
  ['Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune'].forEach(n=>pos[n]=planetPos(n,d,sun));
  pos.Pluto=plutoPos(d,sun);
  const gmst0=rev(sun.Ls+180), lst=rev(gmst0+utH*15.04107+lng), ramc=lst;
  const mc=atan2d(sind(ramc),cosd(ramc)*cosd(ecl));
  let asc=atan2d(cosd(ramc),-(sind(ramc)*cosd(ecl)+tand(lat)*sind(ecl)));
  if(rev(asc-mc)>180) asc=rev(asc+180);
  return {pos,asc,mc,ecl};
}
function houseOf(lon,asc){return ((Math.floor(rev(lon)/30)-Math.floor(rev(asc)/30)+12)%12)+1;}
function fmtPos(lon){
  const s=Math.floor(rev(lon)/30),deg=rev(lon)-s*30,dd=Math.floor(deg),mm=Math.floor((deg-dd)*60);

}
function findAspects(pos){
  const out=[];
  for(let a=0;a<BODIES.length;a++)for(let b=a+1;b<BODIES.length;b++){
    let diff=Math.abs(rev(pos[BODIES[a]].lon-pos[BODIES[b]].lon)); if(diff>180)diff=360-diff;
    for(const asp of ASPECTS){const orb=Math.abs(diff-asp.angle);if(orb<=asp.orb){out.push({p1:BODIES[a],p2:BODIES[b],asp,orb});break;}}
  }
  return out;
}

/* ---------- wheel (traditional style, signs clockwise from Aries) ---------- */
let CURRENT=null, ISO=null;
const S=360, C=S/2;
function polar(lon,r){const a=(180-lon)*D2R;return [C+r*Math.cos(a), C-r*Math.sin(a)];}
function sector(l0,l1,r1,r2,fill){
  const [ax,ay]=polar(l0,r2),[bx,by]=polar(l1,r2),[cx,cy]=polar(l1,r1),[dx,dy]=polar(l0,r1);
  return `<path d="M${ax.toFixed(1)} ${ay.toFixed(1)} A${r2} ${r2} 0 0 1 ${bx.toFixed(1)} ${by.toFixed(1)} L${cx.toFixed(1)} ${cy.toFixed(1)} A${r1} ${r1} 0 0 0 ${dx.toFixed(1)} ${dy.toFixed(1)} Z" fill="${fill}" fill-opacity="0.55" stroke="var(--line)" stroke-width="0.5"/>`;
}
function drawWheel(ch){
  const rOut=C-3, rZod=C-30, rHou=C-52, rPl=C-72, rAsp=C-90, asc=ch.asc;
  let s=`<svg viewBox="0 0 ${S} ${S}" role="img">`;
  s+=ZODIAC_DEFS;
  s+=`<circle cx="${C}" cy="${C}" r="${rHou}" fill="var(--wheelbg)"/>`;
  // zodiac band
  const gs=17;
  for(let i=0;i<12;i++){
    s+=sector(i*30,(i+1)*30,rZod,rOut,ELEM_VAR[i%4]);
    const [gx,gy]=polar(i*30+15,(rZod+rOut)/2);
    s+=`<use href="#z${i}" x="${(gx-gs/2).toFixed(1)}" y="${(gy-gs/2).toFixed(1)}" width="${gs}" height="${gs}" color="var(--ink)"/>`;
  }
  // house ring: whole-sign, roman numerals, cusp ticks at sign boundaries
  const ascSign=Math.floor(rev(asc)/30);
  for(let h=0;h<12;h++){
    const sIdx=(ascSign+h)%12, cuspLon=sIdx*30;
    const [x1,y1]=polar(cuspLon,rHou),[x2,y2]=polar(cuspLon,rZod);
    s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--line)" stroke-dasharray="2 3"/>`;
    const [rx,ry]=polar(sIdx*30+15,(rHou+rZod)/2);
    s+=`<text x="${rx.toFixed(1)}" y="${(ry+4).toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--ink3)">${ROMAN[h]}</text>`;
  }
  // angles ASC/DSC/MC/IC
  [[asc,'Asc','var(--axis)'],[rev(asc+180),'Dsc','var(--axis)'],[ch.mc,'MC','var(--mc)'],[rev(ch.mc+180),'IC','var(--mc)']].forEach(([lon,lbl,col])=>{
    const [x2,y2]=polar(lon,rOut);
    s+=`<line x1="${C}" y1="${C}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${col}" stroke-width="1.3" opacity="0.7"/>`;
    const [lx,ly]=polar(lon,rOut+0);
    s+=`<text x="${lx.toFixed(1)}" y="${(ly-3).toFixed(1)}" text-anchor="middle" font-size="10" fill="${col}">${lbl}</text>`;
  });
  // aspect lines
  const asps=findAspects(ch.pos);
  asps.forEach(a=>{
    const [x1,y1]=polar(ch.pos[a.p1].lon,rAsp),[x2,y2]=polar(ch.pos[a.p2].lon,rAsp);
    const dim=ISO&&ISO!==a.p1&&ISO!==a.p2;
    s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${a.asp.color}" stroke-width="1" opacity="${dim?0.07:(ISO?0.95:0.4)}"/>`;
  });
  // planets
  const placed=[];
  BODIES.forEach(n=>{
    let disp=ch.pos[n].lon;
    placed.forEach(pl=>{if(Math.abs(rev(disp-pl))<7||Math.abs(rev(pl-disp))<7)disp=rev(disp+7);});
    placed.push(disp);
    const [px,py]=polar(disp,rPl);
    const dim=ISO&&ISO!==n&&!asps.some(a=>(a.p1===ISO&&a.p2===n)||(a.p2===ISO&&a.p1===n));
    const hot=ISO===n;
    const [tx,ty]=polar(ch.pos[n].lon,rAsp+3);
    s+=`<g class="pl" data-p="${n}" style="cursor:pointer" opacity="${dim?0.25:1}">`;
    s+=`<line x1="${tx.toFixed(1)}" y1="${ty.toFixed(1)}" x2="${px.toFixed(1)}" y2="${py.toFixed(1)}" stroke="var(--ink3)" stroke-width="0.5" opacity="0.5"/>`;
    s+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="12" fill="var(--paper)" stroke="${hot?'var(--accent)':'var(--line)'}" stroke-width="${hot?2:1}"/>`;
    s+=`<text x="${px.toFixed(1)}" y="${(py+5).toFixed(1)}" text-anchor="middle" font-size="15" fill="var(--ink)">${GLYPH[n]}</text>`;
    s+=`</g>`;
  });
  s+=`</svg>`;
  document.getElementById('wheel').innerHTML=s;
  document.querySelectorAll('#wheel .pl').forEach(g=>g.addEventListener('click',()=>{const p=g.dataset.p;ISO=(ISO===p?null:p);drawWheel(ch);showDetail(p,ch);}));
}

/* ---------- transit engine + on-device personalization (no API) ---------- */
const LKEY='astrarium_learn_v1';
function loadLearn(){try{return JSON.parse(localStorage.getItem(LKEY))||{}}catch(e){return{}}}
function saveLearn(o){localStorage.setItem(LKEY,JSON.stringify(o));}
function learn(){const o=loadLearn();o.obs=o.obs||[];o.feat=o.feat||{};return o;}
function featStat(o,k){return o.feat[k]||{rSum:0,rN:0,vSum:0,vN:0};}
function learnedRes(o,k){const f=featStat(o,k);return (2+f.rSum)/(2+f.rN);}
function learnedVal(o,k){const f=featStat(o,k);return (0+f.vSum)/(2+f.vN);}
function currentTransits(ch){
  const now=new Date(),utH=now.getUTCHours()+now.getUTCMinutes()/60;
  const tp=computeChart(now.getUTCFullYear(),now.getUTCMonth()+1,now.getUTCDate(),utH,0,0,0).pos;
  const hits=[];
  ['Jupiter','Saturn','Uranus','Neptune','Pluto','Mars','Sun','Venus','Mercury'].forEach(T=>{
    BODIES.concat(['ASC','MC']).forEach(np=>{
      const nlon=np==='ASC'?ch.asc:np==='MC'?ch.mc:ch.pos[np].lon;
      let diff=Math.abs(rev(tp[T].lon-nlon));if(diff>180)diff=360-diff;
      for(const asp of ASPECTS){const orb=Math.abs(diff-asp.angle),maxo=Math.min(asp.orb,SPEED_ORB[T]+2);if(orb<=maxo){hits.push({tp:T,np,asp,orb,maxo});break;}}
    });
  });
  return hits;
}
function personalWeight(o,h){
  const base=RECEIVER_RANK[h.np]||0.6, intensity=Math.cos((h.orb/h.maxo)*Math.PI/2)**2;
  const personal=(learnedRes(o,'tp:'+h.tp)+learnedRes(o,'np:'+h.np)+learnedRes(o,'as:'+h.asp.name))/3;
  return base*intensity*personal;
}
const sig=h=>`${h.tp}.${h.asp.name}.${h.np}`;
function transitText(o,h){
  const v=(learnedVal(o,'tp:'+h.tp)+learnedVal(o,'np:'+h.np))/2, hard=h.asp.kind==='hard';
  let frame;
  if(LANG==='ru'){
    if(v<=-0.6) frame=hard?'обычно ощущается тяжело именно у вас, берегите силы':'мягкий подъём, который вам обычно в радость';
    else if(v>=0.6) frame=hard?'вы проживаете это как продуктивное давление, а не как надрыв':'лёгкое, заряжающее окно для вас';
    else frame=hard?'точка трения, требующая настройки':'поддерживающее, текучее влияние';
    return `${GLYPH[h.tp]} ${PN(h.tp)} ${ASPECT_NAME.ru[h.asp.name]} к вашему ${GLYPH[h.np]||''} ${PN(h.np)} - ${frame}.`;
  } else {
    if(v<=-0.6) frame=hard?'tends to land heavily for you, protect your energy':'a smooth lift you usually enjoy';
    else if(v>=0.6) frame=hard?'you experience this as productive pressure, not strain':'an easy, energizing window for you';
    else frame=hard?'a friction point that asks for adjustment':'a supportive, flowing influence';
    return `${GLYPH[h.tp]} ${h.tp} ${h.asp.name} your ${GLYPH[h.np]||''} ${h.np} - ${frame}.`;

function recall(o,s){
  const past=o.obs.filter(x=>x.sig===s).sort((a,b)=>b.t-a.t)[0]; if(!past)return '';

function rate(hits,s,patch){
  const o=learn(),hit=hits.find(x=>sig(x.h)===s); if(!hit)return; const h=hit.h;
  let obs=o.obs.find(x=>x.sig===s&&Date.now()-x.t<86400000*3);
  if(!obs){obs={sig:s,t:Date.now(),tp:h.tp,np:h.np,asp:h.asp.name,r:null,val:null,area:null,note:''};o.obs.push(obs);}
  Object.assign(obs,patch); obs.t=Date.now();
  o.feat={};
  o.obs.forEach(x=>{
    const rv=x.r!=null?x.r:1.5, vv=x.val==='hard'?-1.5:x.val==='easy'?1.5:x.val==='neutral'?0:null;
    ['tp:'+x.tp,'np:'+x.np,'as:'+x.asp].forEach(k=>{const f=o.feat[k]=o.feat[k]||{rSum:0,rN:0,vSum:0,vN:0};if(x.r!=null){f.rSum+=rv;f.rN++;}if(vv!=null){f.vSum+=vv;f.vN++;}});
    if(x.area){const k='ar:'+x.area;o.feat[k]=o.feat[k]||{rSum:0,rN:0,vSum:0,vN:0};o.feat[k].rN++;}
  });
  saveLearn(o); renderTransits(CURRENT);
}

  drawWheel(CURRENT); renderPositions(CURRENT);
  document.getElementById('reading').innerHTML=natalReading(CURRENT);
  renderTransits(CURRENT);
  document.getElementById('detail').className='detail empty';
  document.getElementById('detail').textContent=t('tapdetail');
}

}));
